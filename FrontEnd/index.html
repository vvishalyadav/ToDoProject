<script>
    function Submit(){
        var name=$("#name").val();
        var EmailId=$("#EmailId").val();

    $.ajax({
            url: "http://127.0.0.1:8000/user",
            type: "POST",
            
            data: {"name":name,EmailId:EmailId},
            success: function(response) {
            if (response.redirect_to) {
                window.location.href = response.redirect_to;
            }
        }
    });
}
